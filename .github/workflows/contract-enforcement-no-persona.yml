name: Contract Enforcement - No Persona Content

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '**/*.swift'
      - '**/*.tsx'
      - '**/*.ts'
      - '.github/workflows/contract-enforcement-no-persona.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.md'
      - '**/*.swift'
      - '**/*.tsx'
      - '**/*.ts'
      - '.github/workflows/contract-enforcement-no-persona.yml'

# ALLOWLIST RATIONALE
# -------------------
# The contract enforced here (REPOS-CONTRACT.md) keeps persona, interface-UX,
# onboarding, and meta-library content out of You-Sir Juan. The checks below
# greenlight a small, explicit set of files where persona / interface mentions
# are intentional because the file's *job* is to describe or document the
# product as a whole:
#
#   REPOS-CONTRACT.md             — defines the contract itself
#   CI-CONTRACT-GUIDE.md          — documents these checks with example strings
#   CLAUDE.md                     — agent routing guide; needs the Associate Agent table
#   README.md / README2.md        — repo-level product description
#   apps/README.md                — app surface description
#   docs/marketing/**             — product marketing pages
#   docs/assistant-role-templates.md — assistant template reference
#   docs/hardware/**              — hardware specs that reference product capabilities
#
# Adding new files to the allowlist below should require team review.
# Anything outside the allowlist still gets blocked.

jobs:
  enforce-no-persona:
    name: Check for forbidden persona/interface content
    runs-on: ubuntu-latest
    env:
      # Lines starting with these path prefixes are allowed to contain
      # persona / interface / onboarding terms. Used with `grep -vE` to
      # filter `grep -rn` output. The leading `(\./)?` tolerates both
      # GNU grep (which prepends `./` to relative paths) and BSD grep
      # (which doesn't) — useful for local dry-runs on macOS.
      ALLOWLIST_LINE: '^(\./)?(REPOS-CONTRACT|CI-CONTRACT-GUIDE|CLAUDE|README|README2)\.md:|^(\./)?apps/README\.md:|^(\./)?docs/marketing/[^:]*:|^(\./)?docs/hardware/[^:]*:|^(\./)?docs/assistant-role-templates\.md:'
      # Same allowlist but for full paths (no `:`), for `grep -l` output.
      ALLOWLIST_PATH: '^(\./)?(REPOS-CONTRACT|CI-CONTRACT-GUIDE|CLAUDE|README|README2)\.md$|^(\./)?apps/README\.md$|^(\./)?docs/marketing/|^(\./)?docs/hardware/|^(\./)?docs/assistant-role-templates\.md$'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for Associate Agent personas
        run: |
          echo "🔍 Checking for forbidden persona definitions (Sterling, Blake, Cipher, Sovereign as Associate Agents)..."
          OFFENDERS=$(grep -rn "Associate Agent" --include="*.md" --exclude-dir=node_modules --exclude-dir=vendor --exclude-dir=.git . 2>/dev/null | grep -vE "$ALLOWLIST_LINE" || true)
          if [ -n "$OFFENDERS" ]; then
            echo "❌ FAIL: Found Associate Agent references outside the allowlist:"
            echo "$OFFENDERS"
            echo ""
            echo "Either move persona content to the Nephew repo, or — if this file legitimately"
            echo "describes the product — add it to the ALLOWLIST_LINE in this workflow."
            exit 1
          fi
          OFFENDERS_TABLE=$(grep -rnE "Member.*Associate.*Palette.*Character" --include="*.md" --exclude-dir=node_modules --exclude-dir=vendor --exclude-dir=.git . 2>/dev/null | grep -vE "$ALLOWLIST_LINE" || true)
          if [ -n "$OFFENDERS_TABLE" ]; then
            echo "❌ FAIL: Found Associate Agent table outside the allowlist:"
            echo "$OFFENDERS_TABLE"
            exit 1
          fi
          # Files containing all four persona names (Sterling + Blake + Cipher + Sovereign)
          PERSONA_FILES=$(
            grep -rl "Sterling" --include="*.md" --exclude-dir=node_modules --exclude-dir=vendor --exclude-dir=.git . 2>/dev/null \
              | xargs -I{} sh -c 'grep -l "Blake" "{}" 2>/dev/null' \
              | xargs -I{} sh -c 'grep -l "Cipher" "{}" 2>/dev/null' \
              | xargs -I{} sh -c 'grep -l "Sovereign" "{}" 2>/dev/null' \
              | grep -vE "$ALLOWLIST_PATH" || true
          )
          if [ -n "$PERSONA_FILES" ]; then
            echo "❌ FAIL: Found all four Associate Agents defined together in non-allowlisted file(s):"
            echo "$PERSONA_FILES"
            exit 1
          fi
          echo "✅ PASS: No persona definitions found outside the allowlist."

      - name: Check for interface UX content
        run: |
          echo "🔍 Checking for forbidden interface UX (Walk-Up Kiosk, Biometric Authentication, Voice-First)..."
          OFFENDERS=$(grep -rnE "Walk-Up Kiosk|Biometric Authentication|Voice-First" --include="*.md" --include="*.swift" --include="*.tsx" --include="*.ts" --exclude-dir=node_modules --exclude-dir=vendor --exclude-dir=.git . 2>/dev/null | grep -vE "$ALLOWLIST_LINE" || true)
          if [ -n "$OFFENDERS" ]; then
            echo "❌ FAIL: Found interface UX content outside the allowlist:"
            echo "$OFFENDERS"
            echo ""
            echo "Move interface content to Nephew repo, or add the file to the allowlist if appropriate."
            exit 1
          fi
          echo "✅ PASS: No interface UX content found outside the allowlist."

      - name: Check for family member onboarding
        run: |
          echo "🔍 Checking for forbidden onboarding flow content..."
          OFFENDERS=$(grep -rnE "family member is provisioned|onboarding process|new member is provisioned" --include="*.md" --include="*.swift" --include="*.tsx" --include="*.ts" --exclude-dir=node_modules --exclude-dir=vendor --exclude-dir=.git . 2>/dev/null | grep -vE "$ALLOWLIST_LINE" || true)
          if [ -n "$OFFENDERS" ]; then
            echo "❌ FAIL: Found onboarding flow content outside the allowlist:"
            echo "$OFFENDERS"
            exit 1
          fi
          echo "✅ PASS: No onboarding flow content found outside the allowlist."

      - name: Check for meta-library content
        run: |
          echo "🔍 Checking for forbidden meta-library/compounding brain content..."
          OFFENDERS=$(grep -rnE "meta-library|compounding brain|session learnings" --include="*.md" --include="*.swift" --include="*.tsx" --include="*.ts" --exclude-dir=node_modules --exclude-dir=vendor --exclude-dir=.git . 2>/dev/null | grep -vE "$ALLOWLIST_LINE" || true)
          if [ -n "$OFFENDERS" ]; then
            echo "❌ FAIL: Found meta-library content outside the allowlist:"
            echo "$OFFENDERS"
            exit 1
          fi
          echo "✅ PASS: No meta-library content found outside the allowlist."

      - name: Summary
        run: |
          echo ""
          echo "📋 Contract Enforcement Summary for You-Sir Juan:"
          echo "✅ No persona definitions outside the product-doc allowlist"
          echo "✅ No interface UX outside the product-doc allowlist"
          echo "✅ No onboarding flows outside the product-doc allowlist"
          echo "✅ No meta-library content outside the product-doc allowlist"
          echo ""
          echo "Allowlisted files (intentional exceptions):"
          echo "  - REPOS-CONTRACT.md, CI-CONTRACT-GUIDE.md"
          echo "  - CLAUDE.md, README.md, README2.md, apps/README.md"
          echo "  - docs/marketing/**, docs/hardware/**"
          echo "  - docs/assistant-role-templates.md"
