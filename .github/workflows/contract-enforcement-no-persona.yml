name: Contract Enforcement - No Persona Content

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '**/*.swift'
      - '**/*.tsx'
      - '**/*.ts'
  pull_request:
    branches: [main]
    paths:
      - '**/*.md'
      - '**/*.swift'
      - '**/*.tsx'
      - '**/*.ts'

jobs:
  enforce-no-persona:
    name: Check for forbidden persona/interface content
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for Associate Agent personas
        run: |
          echo "🔍 Checking for forbidden persona definitions (Sterling, Blake, Cipher, Sovereign as Associate Agents)..."
          # Check for persona table or Associate Agent definitions (not "Sovereign" as adjective for infrastructure)
          if grep -r "Associate Agent" --include="*.md" . 2>/dev/null | grep -v "REPOS-CONTRACT"; then
            echo "❌ FAIL: Found Associate Agent definitions in You-Sir Juan"
            echo "You-Sir Juan MUST NOT contain Associate Agent personas."
            echo "Move persona content to Nephew repo."
            exit 1
          fi
          if grep -r "Member.*Associate.*Palette.*Character" --include="*.md" . 2>/dev/null | grep -v "REPOS-CONTRACT"; then
            echo "❌ FAIL: Found Associate Agent table in You-Sir Juan"
            exit 1
          fi
          # Check for all four personas defined together (signature of persona table)
          PERSONA_COUNT=$(grep -l "Sterling" --include="*.md" . 2>/dev/null | xargs -I{} grep -l "Blake" {} 2>/dev/null | xargs -I{} grep -l "Cipher" {} 2>/dev/null | xargs -I{} grep -l "Sovereign" {} 2>/dev/null | wc -l)
          if [ "$PERSONA_COUNT" -gt 0 ]; then
            echo "❌ FAIL: Found all four Associate Agents defined together"
            exit 1
          fi
          echo "✅ PASS: No persona definitions found"

      - name: Check for interface UX content
        run: |
          echo "🔍 Checking for forbidden interface UX (Walk-Up Kiosk, Biometric, Voice-First)..."
          if grep -r "Walk-Up Kiosk\|Biometric Authentication\|Voice-First\|Associate Agent" --include="*.md" --include="*.swift" --include="*.tsx" --include="*.ts" . 2>/dev/null; then
            echo "❌ FAIL: Found interface UX content in You-Sir Juan"
            echo "You-Sir Juan MUST NOT contain interface/experience content."
            echo "Move interface content to Nephew repo."
            exit 1
          else
            echo "✅ PASS: No interface UX content found"
          fi

      - name: Check for family member onboarding
        run: |
          echo "🔍 Checking for forbidden onboarding flow content..."
          if grep -r "family member is provisioned\|onboarding process\|new member is provisioned" --include="*.md" --include="*.swift" --include="*.tsx" --include="*.ts" . 2>/dev/null; then
            echo "❌ FAIL: Found onboarding flow content in You-Sir Juan"
            echo "You-Sir Juan MUST NOT contain family member onboarding."
            echo "Move onboarding content to Nephew repo."
            exit 1
          else
            echo "✅ PASS: No onboarding flow content found"
          fi

      - name: Check for meta-library content
        run: |
          echo "🔍 Checking for forbidden meta-library/compounding brain content..."
          if grep -r "meta-library\|compounding brain\|session learnings" --include="*.md" --include="*.swift" --include="*.tsx" --include="*.ts" . 2>/dev/null; then
            echo "❌ FAIL: Found meta-library content in You-Sir Juan"
            echo "You-Sir Juan MUST NOT contain meta-library/compounding brain."
            echo "Move meta-library content to Nephew repo."
            exit 1
          else
            echo "✅ PASS: No meta-library content found"
          fi

      - name: Summary
        run: |
          echo ""
          echo "📋 Contract Enforcement Summary for You-Sir Juan:"
          echo "✅ No persona definitions (Sterling, Blake, Cipher, Sovereign)"
          echo "✅ No interface UX (kiosk, biometric, voice-first)"
          echo "✅ No onboarding flows"
          echo "✅ No meta-library content"
          echo ""
          echo "You-Sir Juan is correctly infrastructure-only."
