# /etc/systemd/system/ollama.service.d/override.conf
#
# Forces Ollama to bind on 0.0.0.0 (so Docker containers + tailnet devices can
# reach it) and to use a custom OLLAMA_MODELS directory.
#
# Install:
#   sudo mkdir -p /etc/systemd/system/ollama.service.d
#   # Edit OLLAMA_MODELS to your desired path, then:
#   sudo cp ollama-systemd-override.conf /etc/systemd/system/ollama.service.d/override.conf
#   sudo systemctl daemon-reload
#   sudo systemctl restart ollama
#
# IMPORTANT: combine with iptables-public-lockdown.sh to BLOCK port 11434 from
# the public internet — otherwise binding to 0.0.0.0 exposes Ollama to the world.

[Service]
Environment="OLLAMA_HOST=0.0.0.0:11434"
Environment="OLLAMA_MODELS=/home/__USER__/.ollama/models"
