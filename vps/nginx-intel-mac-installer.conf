# nginx-intel-mac-installer.conf
# Serves the one-liner URL: https://get.yousirjuan.ai/intel-mac
#
# Add this location block to the get.yousirjuan.ai vhost (or the main
# yousirjuan.ai nginx config). The installer is hosted as a GitHub Release
# artifact on marvelousempire/yousirjuan-ai — nginx just redirects to it.
#
# Activate:
#   cp vps/nginx-intel-mac-installer.conf /etc/nginx/snippets/ysj-intel-mac.conf
#   # Then include it inside the get.yousirjuan.ai server block:
#   include /etc/nginx/snippets/ysj-intel-mac.conf;
#   nginx -t && systemctl reload nginx

# ── /intel-mac → latest release installer ───────────────────────────────────
location = /intel-mac {
    # Redirect to the latest GitHub Release artifact.
    # Update the version tag when a new release is cut, or use the
    # /latest/download/ path which auto-resolves to the newest tag.
    return 302 https://github.com/marvelousempire/yousirjuan-ai/releases/latest/download/install-intel-mac.sh;
}

# ── /intel-mac/sha256 → checksum file ───────────────────────────────────────
location = /intel-mac/sha256 {
    return 302 https://github.com/marvelousempire/yousirjuan-ai/releases/latest/download/install-intel-mac.sh.sha256;
}

# ── /intel-mac/guide → OpenCore Sonoma guide (rendered on GitHub) ───────────
location = /intel-mac/guide {
    return 302 https://github.com/marvelousempire/yousirjuan/blob/main/installers/intel-mac/opencore-sonoma-guide.md;
}
