# ~/.config/systemd/user/nephew-tower-api.service.d/direct-url.conf
# LEDGER-0027 / LEDGER-0026 — systemd drop-in that tells the tower-api on
# clinic-vps to call the DGX directly over the family WG mesh, bypassing the
# SSH-tunnel-via-`nephew-nivram` path that only works on the operator's Mac.
#
# Applied by: cp this file to the path above, then:
#   systemctl --user daemon-reload
#   systemctl --user restart nephew-tower-api
[Service]
Environment=NEPHEW_HERMES_DIRECT_URL=http://192.168.8.249:8642/v1/chat/completions
