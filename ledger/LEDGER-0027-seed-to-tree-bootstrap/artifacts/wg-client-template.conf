# wg0.conf template for a NEW peer joining the family WG mesh.
# LEDGER-0027 — fill in the four ANGLE-BRACKET fields and write to /etc/wireguard/wg0.conf
# on the new peer device.
#
# After saving:
#   sudo chmod 600 /etc/wireguard/wg0.conf
#   sudo systemctl enable --now wg-quick@wg0
#   sudo wg show wg0

[Interface]
PrivateKey = <CONTENTS_OF_PEER_PRIVATE_KEY>
Address = 10.0.0.<NEXT_FREE_PEER_NUMBER>/24

# DNS line is optional. Uncomment if you want this peer to use the GL-MT6000's
# DNS server through the tunnel:
# DNS = 192.168.8.1

[Peer]
# GL-MT6000 server (constant for every peer in the family mesh)
PublicKey = Be87LSRYnvURzDNnnHOCWdfUC/o5tDkaxrdJmEU0iAI=
Endpoint = xr5899d.glddns.com:51820
AllowedIPs = 10.0.0.0/24, 192.168.8.0/24
PersistentKeepalive = 25

# Peer number convention:
#   10.0.0.2 — MacBook Pro
#   10.0.0.3 — iPhone
#   10.0.0.4 — GL-AX1800
#   10.0.0.5 — clinic-vps
#   10.0.0.6+ — future peers (always increment, never reuse)
#
# AllowedIPs explained:
#   10.0.0.0/24    — the WG subnet (so this peer can reach other peers)
#   192.168.8.0/24 — the home LAN (so this peer can reach the DGX at 192.168.8.249)
#
# DO NOT add 0.0.0.0/0 unless you want ALL the peer's internet traffic to
# flow through the home network (you don't — that's a privacy + bandwidth
# foot-gun).
