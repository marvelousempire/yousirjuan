# /etc/sysctl.d/99-nephew-arp-filter.conf
# LEDGER-0027 / LEDGER-0026 — fix DGX dual-interface asymmetric routing.
#
# The DGX has both enP7s7 (wired, 192.168.8.249) and wlP9s9 (wifi, 192.168.8.114)
# on the same subnet. Without arp_filter, ARP replies can come from either
# interface for either IP, and TCP replies can exit a different interface than
# the request arrived on. The GL-MT6000's stateful firewall drops the asymmetric
# traffic, breaking off-LAN peers.
#
# arp_filter=1: reply to ARP requests for IP X only via the interface that
#               holds X. Eliminates ARP ambiguity.
# rp_filter=2:  loose reverse-path filtering (allow if return route exists on
#               any interface). Avoids dropping legitimate asymmetric traffic
#               that arp_filter can't fix on its own.
net.ipv4.conf.all.arp_filter=1
net.ipv4.conf.default.arp_filter=1
net.ipv4.conf.all.rp_filter=2
