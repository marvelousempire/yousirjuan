# LEDGER-0027 — nginx location block for /api/agents/*
# Insert BEFORE the `/api/` catch-all block in /etc/nginx/sites-enabled/nephew.yousirjuan.ai

    # Plan 0090 / LEDGER-0026 — /api/agents/* routes to tower-api at :8088.
    # Chat surface lives at /api/agents/nephew-chat/{chat,status}.
    location ~ ^/api/agents/ {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming support — disable buffering so tokens reach the client
        # as the model emits them, not in a final flush.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Pass through the Authorization header for Bearer auth (already default
        # behavior, but explicit).
        proxy_pass_request_headers on;
    }
