# Sandbox for grok-cli — generated by LEDGER-0010 Makefile.

services:
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    image: sandbox-grok-cli:latest
    container_name: sandbox-grok-cli
    hostname: sandbox-grok-cli

    volumes:
      - ${HOME}/sandbox-workspaces/grok-cli:/workspace:rw

    working_dir: /workspace

    networks:
      - sandbox-net-grok-cli

    mem_limit: 2g
    memswap_limit: 2g
    cpus: 2.0

    stdin_open: true
    tty: true

    # Grok CLI reads its API key from env. The host operator puts it at
    # ~/sandbox-workspaces/grok-cli/.env (chmod 600), referenced via env_file.
    env_file:
      - ${HOME}/sandbox-workspaces/grok-cli/.env

    entrypoint: ["/bin/bash"]

networks:
  sandbox-net-grok-cli:
    name: sandbox-net-grok-cli
    driver: bridge
    # Outbound web is REQUIRED (Grok CLI calls grok.com / x.ai). Leave internal: false.
