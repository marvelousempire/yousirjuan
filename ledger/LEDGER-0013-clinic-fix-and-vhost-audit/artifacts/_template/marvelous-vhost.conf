# nginx vhost generated by LEDGER-0013 wire-marvelous-app.sh
# vhost: __VHOST__
# proxies to: 127.0.0.1:__PORT__
#
# Acquire TLS cert separately (certbot --nginx -d __VHOST__).
# Until then, the listen 443 block below is harmless — nginx serves
# 502/upgrade-required until certbot writes the cert paths.

server {
    listen 80;
    listen [::]:80;
    server_name __VHOST__;

    # ACME challenge stays HTTP for certbot
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Everything else redirects to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __VHOST__;

    # certbot writes ssl_certificate + ssl_certificate_key after `certbot --nginx -d __VHOST__`
    # ssl_certificate     /etc/letsencrypt/live/__VHOST__/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/__VHOST__/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;

    access_log /var/log/nginx/__APP_NAME__-access.log;
    error_log  /var/log/nginx/__APP_NAME__-error.log;

    location / {
        proxy_pass http://127.0.0.1:__PORT__;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade headers (safe to include even for non-WS apps)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 90;
    }
}
