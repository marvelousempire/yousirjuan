# Family fleet inventory — verified 2026-07-01 (see docs/hardware/fleet-capability-matrix.md)
# Home builds use LAN + SSH key. WireGuard is only for remote access, not required here.
all:
  children:

    linux:
      hosts:
        dgx:
          ansible_host: nephew-spark        # SSH alias → DGX Spark (also WG 10.1.0.5)
          ansible_user: abrownsanta
          node_role: frontier-ai-runtime
          # GB10 Grace Blackwell · 20-core Arm · 128GB · 4TB M.2 · 10GbE + 2x QSFP ConnectX-7
          nas_10gbe:
            enabled: true
            iface: enP7s7
            dgx_ip: 10.77.0.2/30
            nas_peer: 10.77.0.1
            mtu: 9000                       # jumbo (NAS LAN2 also 9000; LAN1 stays 1500)
            mounts:
              - { src: "10.77.0.1:/volume2/media",  path: /mnt/nas-media }
              - { src: "10.77.0.1:/volume1/docker", path: /mnt/nas-docker }

    macs:
      vars:
        ansible_python_interpreter: /usr/bin/python3
      hosts:
        fivemac:
          ansible_host: fivemac             # M5 Max (Mac17,6) · 128GB · 8TB · TB5 · control node
          ansible_user: averygoodman
          ansible_connection: local         # agents run ON fivemac — no SSH to self
          node_role: workstation
          reachable: true
        onemac:
          ansible_host: onemac.local        # M1 · 8GB · small edge (embed/STT)
          ansible_user: averygoodman
          node_role: edge-small
          reachable: true
        twomac:
          ansible_host: 10.1.0.6            # WireGuard canonical · iMac18,2 (2017) · i5-7500 · 64GB · macOS 15.7 OCLP
          ansible_user: averygoodman
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519_twomac
          node_role: mac-fleet              # 64GB → strongest Intel Mac (x86 backend/services)
          reachable: true
        bigmac:
          ansible_host: 192.168.10.182      # 2012 iMac · i7-3770 · legacy x86 (light)
          ansible_user: abrownsanta
          node_role: legacy-x86
          reachable: true

    # Storage tier — managed via UGOS UI (NFS/network), not Ansible-configured directly.
    storage:
      hosts:
        nas:
          ansible_host: 192.168.10.119      # UGREEN DXP6800 Pro · LAN1 2.5GbE · LAN2 10GbE
          ansible_connection: local         # informational — no SSH build target
          node_role: nas
          lan2_10gbe_ip: 10.77.0.1/30
