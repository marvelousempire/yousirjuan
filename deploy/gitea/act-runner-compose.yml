# Gitea Actions runner — register once against DGX Gitea.
# Deploy on nephew-spark alongside gitea-gitea-1.
#
# One-time registration (Boss Move — paste token from Gitea UI):
#   Gitea → Site Administration → Actions → Runners → Create new Runner
#   Copy token, then:
#     GITEA_RUNNER_TOKEN=<token> docker compose -f act-runner-compose.yml up -d
#
# Or: bash scripts/gitea-register-act-runner.sh

name: gitea-act-runner

services:
  act_runner:
    image: gitea/act_runner:nightly
    container_name: gitea-act-runner
    restart: unless-stopped
    environment:
      GITEA_INSTANCE_URL: "${GITEA_INSTANCE_URL:-http://gitea-gitea-1:3000}"
      GITEA_RUNNER_REGISTRATION_TOKEN: "${GITEA_RUNNER_TOKEN:?set GITEA_RUNNER_TOKEN}"
      GITEA_RUNNER_NAME: "${GITEA_RUNNER_NAME:-dgx-spark-family-office}"
      GITEA_RUNNER_LABELS: "${GITEA_RUNNER_LABELS:-self-hosted:host}"
    volumes:
      - act-runner-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - gitea_default

volumes:
  act-runner-data:

networks:
  gitea_default:
    external: true
